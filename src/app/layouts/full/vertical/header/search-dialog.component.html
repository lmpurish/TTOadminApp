<div class="p-24 p-b-0">
  <div class="row">
    <div class="col-10">
      <h4 class="f-s-18 f-w-600 m-b-16">Upload Report</h4>
    </div>
    <div class="col-2 d-flex justify-content-end">
      <button mat-icon-button mat-dialog-close class="d-flex justify-content-center">
        <i-tabler name="x" class="icon-18 d-flex"></i-tabler>
      </button>
    </div>
  </div>
</div>

<mat-divider></mat-divider>

<mat-dialog-content class="mat-typography search-dialog">
  <form (submit)="uploadFile($event)">
    <div class="file-upload-container">
      <input type="file" id="fileInput" (change)="onFileSelected($event)"
        accept=".xml,.xls,.xlsx,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        hidden>

      <label for="fileInput" class="file-label" [ngClass]="{ 'disabled': isLoading }">
        <mat-icon>cloud_upload</mat-icon>
        <span *ngIf="!selectedFile">Select File</span>
        <span *ngIf="selectedFile">{{ selectedFile.name }}</span>
      </label>
    </div>

    <mat-form-field *ngIf="isAdmin" appearance="outline" class="theme-select"
      style="min-width: 300px; margin-left: 16px; margin-bottom: 16px;">
      <mat-label>Warehouse</mat-label>

      <mat-select [(ngModel)]="selectedWarehouseId" name="selectedWarehouseId">
        <mat-option *ngFor="let warehouse of warehouses" [value]="warehouse.id">
          {{ warehouse.name || (warehouse.company + ' - ' + warehouse.city) }}
        </mat-option>
      </mat-select>
    </mat-form-field>



    <mat-divider></mat-divider>

    <div class="upload-actions">
      <button mat-button mat-dialog-close>Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="!selectedFile || isLoading">
        <mat-progress-spinner *ngIf="isLoading" mode="indeterminate" diameter="20"></mat-progress-spinner>
        <span *ngIf="!isLoading">Upload File</span>
      </button>
    </div>
  </form>
</mat-dialog-content>
