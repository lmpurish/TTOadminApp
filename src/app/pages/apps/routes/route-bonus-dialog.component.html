<!-- Contenedor del spinner que cubre todo el diálogo -->
<div class="loading-overlay" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>

<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
  <h3>Add Route Bonus</h3>
  <button mat-icon-button mat-dialog-close class="d-flex justify-content-center">
    <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
  </button>
</div>

<mat-dialog-content>
  <form [formGroup]="bonusForm">
    <div class="row">
      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Route Id</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input matInput [value]="local_data?.id" readonly />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Date</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input matInput [value]="(local_data?.date | date:'MMM d, y') || ''" readonly />
        </mat-form-field>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Bonus Type</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <mat-select required formControlName="type" placeholder="Select Bonus Type">
            <mat-option [value]="null" disabled>Select Bonus Type</mat-option>
            <mat-option value="Gas">Gas</mat-option>
            <mat-option value="Rescue">Rescue</mat-option>
            <mat-option value="Extra Stops">Extra Stops</mat-option>
            <mat-option value="Heavy Route">Heavy Route</mat-option>
            <mat-option value="Special Support">Special Support</mat-option>
            <mat-option value="Other">Other</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Amount</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input
            type="number"
            matInput
            formControlName="amount"
            placeholder="Enter amount" />
        </mat-form-field>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-12">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Note</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <textarea
            matInput
            rows="4"
            formControlName="note"
            placeholder="Optional note">
          </textarea>
        </mat-form-field>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <button mat-flat-button color="primary" (click)="saveBonus()" [disabled]="!bonusForm.valid || loading">
        Save
      </button>
      <button mat-flat-button class="m-l-8 bg-error text-white" (click)="closeDialog()" [disabled]="loading">
        Cancel
      </button>
    </div>
  </form>
</mat-dialog-content>
