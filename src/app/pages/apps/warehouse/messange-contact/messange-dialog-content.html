<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
    <h3>{{ action }} Message</h3>
    <button mat-icon-button mat-dialog-close class="d-flex justify-content-center">
        <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
    </button>
</div>

@if(action !== 'Delete') {
<mat-dialog-content>
    <form #userForm="ngForm">
        <div class="row">
            <div class="col-lg-3">
                <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Subject</mat-label>
                <mat-form-field appearance="outline" class="w-100">
                    <input type="text" matInput required [(ngModel)]="local_data.subject" name="subject"
                        placeholder="Subject" />
                </mat-form-field>

                <div class="m-t-16">
                    <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Default</mat-label>
                    <mat-checkbox [(ngModel)]="local_data.isDefault" name="isDefault">
                        Is Default
                    </mat-checkbox>
                </div>

                <div class="m-t-24">
                    <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Editor Mode</mat-label>

                    <div class="d-flex flex-column gap-2">
                        <button mat-stroked-button type="button" (click)="setMode('html')">
                            HTML Mode
                        </button>

                        <button mat-stroked-button type="button" (click)="setMode('visual')">
                            Visual Mode
                        </button>
                    </div>
                </div>

                <div class="m-t-24">
                    <button mat-stroked-button color="primary" type="button" (click)="loadRecruitingTemplate()">
                        Load Recruiting Template
                    </button>
                </div>
            </div>

            <div class="col-lg-9">
                <mat-label class="f-s-14 f-w-600 m-b-8 d-block">
                    Message Body ({{ editorMode === 'html' ? 'Raw HTML' : 'Visual Editor' }})
                </mat-label>

                @if(editorMode === 'html') {
                <textarea matInput [(ngModel)]="local_data.messageBody" name="messageBody" class="html-editor" rows="10" cols="100"
                    placeholder="Paste any HTML here" (input)="onHtmlChange()" (paste)="onPasteHtml($event)">
          </textarea>
                }

                @if(editorMode === 'visual') {
                <div class="editor-wrapper">
                    <quill-editor [(ngModel)]="local_data.messageBody" name="messageBodyVisual" format="html"
                        [modules]="quillModules" [sanitize]="false" (ngModelChange)="onVisualChange()"
                        [style]="{ height: '280px', width: '100%' }">
                    </quill-editor>
                </div>
                }

                <div class="m-t-24">
                    <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Preview</mat-label>
                    <div class="email-preview" [innerHTML]="previewHtml"></div>
                </div>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button mat-flat-button color="primary" type="button" (click)="doAction()" [disabled]="!userForm.valid">
                {{ action }}
            </button>

            <button mat-flat-button class="bg-error text-white" type="button" (click)="closeDialog()">
                Cancel
            </button>
        </div>
    </form>
</mat-dialog-content>
}
@else {
<div class="p-x-24 m-y-8">
    <p class="f-s-14">
        Sure to delete <span class="f-w-600">{{ local_data.subject }}</span>?
    </p>
</div>
<div mat-dialog-actions class="p-x-24 p-b-24">
    <button (click)="doAction()" mat-flat-button>{{ action }}</button>
    <button mat-flat-button (click)="closeDialog()" class="m-l-8 bg-error text-white">
        Cancel
    </button>
</div>
}
