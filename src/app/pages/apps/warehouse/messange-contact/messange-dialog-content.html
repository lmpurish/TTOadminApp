<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
    <h3>{{action}} Message</h3>
    <button mat-icon-button mat-dialog-close class="d-flex justify-content-center">
        <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
    </button>
</div>

@if(action !== 'Delete') {
<mat-dialog-content>
    <form #userForm="ngForm">
        <div class="row">

            <!-- Subject -->
            <div class="col-lg-3">
                <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Subject</mat-label>
                <mat-form-field appearance="outline" class="w-100">
                    <input type="text" matInput required [(ngModel)]="local_data.subject" name="subject"
                        placeholder="Subject" />
                </mat-form-field>
                <div class="col-lg-6 mt-3">
                    <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Default</mat-label>
                    <mat-checkbox [(ngModel)]="local_data.isDefault" name="isDefault">
                        Is Default
                    </mat-checkbox>
                </div>
            </div>

            <!-- Message Body -->
            <div class="col-lg-9">
                <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Message Body</mat-label>
                <div class="w-100" style="border: 1px solid #ccc; border-radius: 4px; padding: 8px;">
                    <quill-editor [(ngModel)]="local_data.messageBody" name="messageBody"
                        [style]="{ height: '200px', width: '100%' }">
                    </quill-editor>
                </div>
            </div>

            <!-- isDefault -->

        </div>

        <!-- Botones -->
        <div class="mt-4 d-flex gap-2">
            <button mat-flat-button color="primary" (click)="doAction()" [disabled]="!userForm.valid">
                {{ action }}
            </button>
            <button mat-flat-button class="bg-error text-white" (click)="closeDialog()">
                Cancel
            </button>
        </div>
    </form>
</mat-dialog-content>

}

@else {
<div class="p-x-24 m-y-8">
    <p class="f-s-14">
        Sure to delete <span class="f-w-600">{{local_data.subject}}</span> ?
    </p>
</div>
<div mat-dialog-actions class="p-x-24 p-b-24">
    <button (click)="doAction()" mat-flat-button>{{action}}</button>
    <button mat-flat-button (click)="closeDialog()" class="m-l-8 bg-error text-white">
        Cancel
    </button>
</div>
}
