<div class="loading-overlay" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>

<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
  <h3>
    {{
      action === 'AddMetro' ? 'Add' :
      action === 'UpdateMetro' ? 'Update' :
      action === 'DeleteMetro' ? 'Delete' : action
    }} Metro
  </h3>

  <button type="button" mat-icon-button mat-dialog-close class="d-flex justify-content-center">
    <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
  </button>
</div>

@if (action !== 'DeleteMetro') {
  <mat-dialog-content>
    <form #metroForm="ngForm">
      <div class="row">
        <div class="col-lg-12">
          <mat-label class="f-s-14 f-w-600 m-b-8 d-block">City</mat-label>
          <mat-form-field appearance="outline" class="w-100">
            <input
              matInput
              type="text"
              required
              [(ngModel)]="local_data.city"
              name="city"
              placeholder="Metro City" />
          </mat-form-field>
        </div>
      </div>

      <br />

      <button
        mat-flat-button
        type="button"
        (click)="doAction()"
        [disabled]="!metroForm.valid || loading">
        {{
          action === 'AddMetro' ? 'Add' :
          action === 'UpdateMetro' ? 'Update' : action
        }}
      </button>

      <button
        mat-flat-button
        type="button"
        class="m-l-8 bg-error text-white"
        (click)="closeDialog()"
        [disabled]="loading">
        Cancel
      </button>
    </form>
  </mat-dialog-content>
}
@else {
  <div class="p-x-24 m-y-8">
    <p class="f-s-14">
      Sure to delete <span class="f-w-600">{{ local_data.city }}</span>?
    </p>
  </div>

  <div mat-dialog-actions class="p-x-24 p-b-24">
    <button
      type="button"
      mat-flat-button
      (click)="doAction()"
      [disabled]="loading">
      Delete
    </button>

    <button
      type="button"
      mat-flat-button
      (click)="closeDialog()"
      class="m-l-8 bg-error text-white"
      [disabled]="loading">
      Cancel
    </button>
  </div>
}
