<h2 mat-dialog-title>Add Adjustment</h2>
<form [formGroup]="form">
    <mat-dialog-content>
        <div class="row">
            <div class="col-12 m-b-12">
                <strong>Driver:</strong> {{ data.driverName }}
            </div>

            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Type</mat-label>
                    <mat-select formControlName="type">
                        <mat-option value="Manual">Manual</mat-option>
                        <mat-option value="Bonus">Bonus</mat-option>
                        <mat-option value="Penalty">Penalty</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Reason</mat-label>
                    <input matInput formControlName="reason" />
                </mat-form-field>
            </div>

            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Amount</mat-label>
                    <input matInput type="number" formControlName="amount" />
                    <mat-hint>Use positive for bonus, negative for deduction</mat-hint>
                </mat-form-field>
            </div>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="close()">Cancel</button>
        <button mat-raised-button color="primary" (click)="save()">Save</button>
    </mat-dialog-actions>
</form>
