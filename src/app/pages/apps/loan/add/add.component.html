<!-- Contenedor del spinner que cubre todo el diálogo -->
<div class="loading-overlay" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>

<div
  class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16"
>
  <h3>Create Manual Loan</h3>
  <button
    mat-icon-button
    mat-dialog-close
    class="d-flex justify-content-center"
    [disabled]="loading"
  >
    <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
  </button>
</div>
<mat-dialog-content [formGroup]="form" class="mat-typography">
  <div class="row m-t-10">
    <!-- Driver ID -->
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Employee</mat-label>
        <mat-select formControlName="driverId" placeholder="Select employee">
          <!-- Contenedor del buscador -->
          <div class="search-container">
            <input
              matInput
              class="search-input"
              placeholder="Search employee..."
              (input)="onSearch($event)"
              (keydown)="$event.stopPropagation()"
            />
          </div>

          <mat-divider></mat-divider>

          <mat-option *ngFor="let emp of filteredEmployees()" [value]="emp.id">
            {{ emp.fullName }}
          </mat-option>

          <mat-option *ngIf="filteredEmployees().length === 0" disabled>
            No employees found.
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Rest of your fields remain the same -->
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Principal Amount ($)</mat-label>
        <input matInput type="number" formControlName="principal" />
      </mat-form-field>
    </div>
    <!-- Installment -->
    <div class="col-lg-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Installment Amount</mat-label>
        <input matInput type="number" formControlName="installmentAmount" />
      </mat-form-field>
    </div>
    <!-- Max Deduction -->
    <div class="col-lg-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Max Deduction per Pay Run</mat-label>
        <input matInput type="number" formControlName="maxDeductionPerPayRun" />
      </mat-form-field>
    </div>
    <!-- Notes -->
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3"></textarea>
      </mat-form-field>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-button
    (click)="onCancel()"
    mat-flat-button
    class="m-l-8 bg-error text-white"
    [disabled]="loading"
  >
    Cancel
  </button>
  <button
    mat-flat-button
    color="primary"
    [disabled]="form.invalid"
    (click)="submit()"
  >
    Submit
  </button>
</mat-dialog-actions>
