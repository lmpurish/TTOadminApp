<!-- Contenedor del spinner que cubre todo el diálogo -->
<div class="loading-overlay" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>

<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
  <h3>{{ action }} Applicant</h3>
  <button mat-icon-button mat-dialog-close class="d-flex justify-content-center" [disabled]="loading">
    <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
  </button>
</div>

<!-- Mostrar formulario si NO es acción de eliminar -->
<mat-dialog-content *ngIf="action !== 'Delete'">
  <form #userForm="ngForm">

    <div class="row">

      <!-- Position (Role) -->
      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-select name="userRole" [(ngModel)]="local_data.userRole" [disabled]="loading">
            <ng-container *ngIf="!loading; else loadingOptions">
              <mat-option *ngFor="let role of (isAdmin ? roles : rolesManager)" [value]="role.value">
                {{ role.viewValue }}
              </mat-option>
            </ng-container>
            <ng-template #loadingOptions>
              <mat-option disabled>Loading roles...</mat-option>
            </ng-template>
          </mat-select>
        </mat-form-field>
      </div>

      <!-- Active Checkbox -->
      <div class="col-lg-3">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Active</mat-label>
        <mat-checkbox [(ngModel)]="local_data.isActive" name="isActive" [disabled]="loading">
          Is Active
        </mat-checkbox>
      </div>

      <!-- Driver # -->
      <div class="col-lg-3">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Driver #</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input type="text" matInput name="identificationNumber" [(ngModel)]="local_data.identificationNumber"
            placeholder="Driver #" [disabled]="loading" />
        </mat-form-field>
      </div>

      <!-- Warehouse -->
      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Warehouse</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <mat-select required [(ngModel)]="local_data.warehouseId" name="warehouseId" [disabled]="loading">
            <mat-option *ngFor="let warehouse of warehouses" [value]="warehouse.id">
              {{ warehouse.company }} - {{ warehouse.city }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Botones -->
    <div class="d-flex justify-content-end mt-4">
      <button mat-flat-button (click)="doAction()" [disabled]="!userForm.valid || loading">
        {{ action }}
      </button>
      <button mat-flat-button class="m-l-8 bg-error text-white" (click)="closeDialog()" [disabled]="loading">
        Cancel
      </button>
    </div>
  </form>
</mat-dialog-content>

<!-- Sección de eliminar -->
<mat-dialog-content *ngIf="action === 'Delete'">
  <div class="p-x-24 m-y-8">
    <p class="f-s-14">
      Are you sure you want to delete <span class="f-w-600">{{ local_data.name }}</span>?
    </p>
  </div>
  <div mat-dialog-actions class="p-x-24 p-b-24">
    <button (click)="doAction()" mat-flat-button [disabled]="loading">{{ action }}</button>
    <button mat-flat-button (click)="closeDialog()" class="m-l-8 bg-error text-white" [disabled]="loading">
      Cancel
    </button>
  </div>
</mat-dialog-content>
