<!-- gross-by-warehouse-card.component.html -->
<mat-card class="cardWithShadow">
  <mat-card-header>
    <mat-card-title>Salary by Warehouse</mat-card-title>
    <mat-card-subtitle>Last period</mat-card-subtitle>
    <mat-card-subtitle>{{ subtitleDate }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <apx-chart [series]="employeeChart.series" [plotOptions]="employeeChart.plotOptions"
      [dataLabels]="employeeChart.dataLabels" [chart]="employeeChart.chart" [legend]="employeeChart.legend"
      [colors]="employeeChart.colors" [tooltip]="employeeChart.tooltip" [xaxis]="employeeChart.xaxis"
      [yaxis]="employeeChart.yaxis" [grid]="employeeChart.grid"></apx-chart>

    <div class="d-flex align-items-center justify-content-between m-t-16">
      <div class="d-flex align-items-center">
        <span class="text-primary bg-light-primary rounded icon-40 d-flex align-items-center justify-content-center">
          <i-tabler name="grid-dots" class="icon-20"></i-tabler>
        </span>

        <div class="m-l-12">
          <span class="f-s-14">Total Gross</span>
          <h5 class="f-s-16 f-w-600 m-t-4">
            {{ totalGross | currency:'USD':'symbol':'1.0-0' }}
          </h5>
        </div>
      </div>

      <div class="d-flex align-items-center">
        <span class="bg-light text-body rounded icon-40 d-flex align-items-center justify-content-center">
          <i-tabler name="grid-dots" class="icon-20"></i-tabler>
        </span>

        <div class="m-l-12">
          <span class="f-s-14">Warehouses</span>
          <h5 class="f-s-16 f-w-600 m-t-4">{{ warehousesCount }}</h5>
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
